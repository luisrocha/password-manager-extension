<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Manager</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <h1>Password Manager</h1>
      <p id="site" class="site">Detecting current site...</p>

      <section id="locked-section">
        <label class="master-password">
          Master password
          <input id="master-password" type="password" autocomplete="current-password" />
        </label>

        <div class="auth-actions">
          <button id="unlock" type="button">Unlock</button>
        </div>
      </section>

      <section id="unlocked-section">
        <button id="fill-now" type="button">Fill credentials</button>

        <fieldset>
          <label>
            <input id="autofill-on-load" type="checkbox" />
            Autofill on page load
          </label>
          <label>
            <input id="allow-http" type="checkbox" />
            Allow autofill on HTTP pages
          </label>
        </fieldset>
      </section>

      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
