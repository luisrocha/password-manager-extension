<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Manager</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <h1>Password Manager</h1>
      <p id="site" class="site">Detecting current site...</p>

      <form id="locked-section">
        <label class="master-password">
          Master password
          <input id="master-password" type="password" autocomplete="current-password" />
        </label>

        <div class="auth-actions">
          <button id="unlock" type="submit">Unlock</button>
        </div>
      </form>

      <section id="unlocked-section">
        <div id="credentials-browser-view">
          <form id="credential-search-form" class="credential-search">
            <input
              id="credential-search-input"
              type="search"
              placeholder="Search passwords..."
              autocomplete="off"
            />
          </form>

          <div id="credential-selection" class="credential-selection hidden">
            <label for="credential-select">Choose account</label>
            <select id="credential-select"></select>
          </div>

          <div id="credential-details" class="credential-details hidden">
            <div class="credential-field">
              <label for="selected-username">Username</label>
              <div class="credential-field-actions">
                <input id="selected-username" type="text" readonly />
                <button id="copy-username" type="button" class="field-action">Copy</button>
              </div>
            </div>

            <div class="credential-field">
              <label for="selected-password">Password</label>
              <div class="credential-field-actions">
                <input id="selected-password" type="text" readonly class="masked" />
                <button id="toggle-password" type="button" class="field-action">Show</button>
                <button id="copy-password" type="button" class="field-action">Copy</button>
              </div>
            </div>
          </div>

          <button id="fill-now" type="button">Fill credentials</button>
          <button id="edit-credential" type="button" class="secondary-action hidden">Edit</button>
          <button id="add-new-credential" type="button" class="secondary-action">Add new credential</button>

          <fieldset>
            <label>
              <input id="autofill-on-load" type="checkbox" />
              Autofill on page load
            </label>
            <label>
              <input id="allow-http" type="checkbox" />
              Allow autofill on HTTP pages
            </label>
          </fieldset>
        </div>

        <form id="new-credential-form" class="hidden">
          <h2 id="new-credential-title" class="form-title">Add new credential</h2>
          <div class="credential-field">
            <label for="new-credential-username">Username</label>
            <input
              id="new-credential-username"
              type="text"
              autocomplete="username"
              autocapitalize="none"
              spellcheck="false"
            />
          </div>

          <div class="credential-field">
            <label for="new-credential-password">Password</label>
            <input
              id="new-credential-password"
              type="password"
              autocomplete="new-password"
              spellcheck="false"
            />
          </div>

          <div class="new-credential-actions">
            <button id="save-new-credential" type="submit">Save</button>
            <button id="delete-credential" type="button" class="danger-action hidden">Delete</button>
            <button id="cancel-new-credential" type="button" class="secondary-action">Cancel</button>
          </div>
        </form>
      </section>

      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
